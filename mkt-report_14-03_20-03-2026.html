        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #334155;
            --border: #475569;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --accent: #f59e0b;
            --green: #22c55e;
            --red: #ef4444;
            --purple: #7c3aed;
            --blue: #3b82f6;
            --pink: #ec4899;
            --cyan: #06b6d4;
            --cat-dautu: #7c3aed;
            --cat-ptbt: #22c55e;
            --cat-kinhdoanh: #3b82f6;
            --cat-khac: #94a3b8;
            --ch-current: #facc15;
            --ch-lastmonth: #b91c1c;
            --ch-lastyear: #9ca3af;
            --ch-avg8w: #06b6d4;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 4px
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        h2 .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block
        }

        h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text2)
        }

        .subtitle {
            text-align: center;
            color: var(--text2);
            margin-bottom: 30px;
            font-size: 1.1rem
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 60%);
            pointer-events: none
        }

        .hero .revenue {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 16px 0
        }

        .hero .growth {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 16px
        }

        .hero .growth .badge {
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem
        }

        .badge.up {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3)
        }

        .badge.down {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3)
        }

        /* Cards & Grid */
        .grid {
            display: grid;
            gap: 20px;
            margin-bottom: 30px
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr)
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: transform .2s, box-shadow .2s
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3)
        }

        .card canvas {
            max-height: 400px
        }

        /* Section Divider */
        .section {
            margin: 50px 0;
            padding-top: 30px;
            border-top: 2px solid var(--border)
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding: 16px 24px;
            border-radius: 12px;
            background: var(--surface)
        }

        .section-header h2 {
            margin: 0;
            font-size: 1.4rem
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .85rem
        }

        th,
        td {
            padding: 8px 10px;
            text-align: center;
            border-bottom: 1px solid var(--border)
        }

        th {
            background: var(--surface2);
            font-weight: 600;
            color: var(--text2);
            position: sticky;
            top: 0
        }

        td {
            color: var(--text)
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03)
        }

        .status-green {
            color: #22c55e;
            font-weight: 700
        }

        .status-red {
            color: #ef4444;
            font-weight: 700
        }

        .status-yellow {
            color: #facc15;
            font-weight: 700
        }

        /* Social Cards */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px
        }

        .social-card {
            background: var(--surface2);
            border-radius: 10px;
            padding: 16px
        }

        .social-card h4 {
            font-size: .95rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .social-card .metric {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: .85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05)
        }

        .social-card .metric .val {
            font-weight: 700;
            color: var(--accent)
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            font-size: .85rem
        }

        .legend span {
            display: flex;
            align-items: center;
            gap: 6px
        }

        .legend .swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            display: inline-block
        }

        @media(max-width:768px) {
            .grid-2 {
                grid-template-columns: 1fr
            }

            .hero .revenue {
                font-size: 2.2rem
            }
        }
    </style>
</head>

                            { name: "Bắt đầu", values: ["3c-TM", "2c-GM", "0c-GM", "0c-B", "0c-B", "0c-B", "0c-B", "1c-TM"] }
                        ]
                    }
                },
                {
                    name: "Ngành Sách Kinh Doanh",
                    color: "#3b82f6",
                    icon: "💼",
                    top15: {

                        current: [19, 6, 7, 6, 4, 3, 2, 2, 1, 1, 1, 1],
                        lastMonth: [0, 5, 0, 3, 0, 5, 2, 0, 0, 0, 1, 0],
                        lastYear: [0, 11, 1, 3, 0, 12, 3, 0, 0, 3, 0, 0],
                        avg8w: [1, 7, 1, 2, 0, 3, 2, 0, 0, 1, 1, 0]
                    },
                    heatmap: {
                        labels: ["24/01-30/01", "31/01-06/02", "07/02-13/02", "14/02-20/02", "21/02-27/02", "28/02-06/03", "07/03-13/03", "14/03-20/03"],
                        data: [
                            { name: "CXB", values: ["0c-GM", "1c-TM", "0c-GM", "0c-B", "1c-TM", "0c-GM", "3c-TM", "19c-TM"] },
                            { name: "DNV", values: ["1c-GM", "3c-TM", "0c-GM", "1c-TM", "0c-GM", "0c-B", "1c-TM", "7c-TM"] },
                            { name: "Siêu Cò", values: ["11c-T", "8c-G", "5c-GM", "3c-GM", "6c-TM", "8c-TM", "8c-B", "6c-G"] },
                            { name: "Bộ Di Sản", values: ["4c-TM", "3c-G", "3c-B", "0c-GM", "3c-TM", "4c-TM", "1c-GM", "6c-TM"] },
                            { name: "Bộ Khởi sự - 7c", values: ["0c-B", "1c-TM", "0c-GM", "0c-B", "2c-TM", "1c-GM", "0c-GM", "4c-TM"] },
                            { name: "Marketing", values: ["4c-TM", "2c-GM", "5c-TM", "0c-GM", "4c-TM", "3c-G", "1c-GM", "3c-TM"] },
                            { name: "LHCT", values: ["4c-TM", "4c-B", "2c-GM", "1c-GM", "0c-GM", "4c-TM", "3c-G", "2c-GM"] },
                            { name: "Siêu sao", values: ["0c-B", "0c-B", "0c-B", "0c-B", "0c-B", "1c-TM", "0c-GM", "1c-TM"] },
                            { name: "Snowball", values: ["0c-B", "2c-TM", "0c-GM", "0c-B", "1c-TM", "2c-TM", "1c-GM", "1c-B"] },
                            { name: "Bộ Alan - 2c", values: ["1c-TM", "1c-B", "1c-B", "0c-GM", "1c-TM", "0c-GM", "1c-TM", "1c-B"] },
                            { name: "Bộ Siêu cò + Linh hồn - 2c", values: ["0c-B", "1c-TM", "0c-GM", "0c-B", "0c-B", "0c-B", "0c-B", "1c-TM"] }
                        ]
                    }
                }
            ]
        };

        // ============================================================
        // 🎨 RENDER ENGINE
        // ============================================================
        Chart.register(ChartDataLabels); // Dăng ký plugin datalabels
        const fmt = n => new Intl.NumberFormat('vi-VN').format(n);
        const fmtM = n => n ? (n / 1000000).toFixed(1) + 'M' : '';
        const app = document.getElementById('app');

        function render() {
            const d = REPORT_DATA;
            app.innerHTML = `
    <h1>📊 DOANH THU BÁN HÀNG THEO TUẦN</h1>
    <p class="subtitle">${d.period.start} - ${d.period.end}</p>
    
    <div class="hero">
      <div style="font-size:1rem;color:var(--text2);font-weight:600">TỔNG DOANH THU</div>
      <div class="revenue">${fmt(d.overview.totalRevenue)} đ</div>
      <div class="growth">
        <span class="badge ${d.overview.vsLastMonth >= 0 ? 'up' : 'down'}">${d.overview.vsLastMonth >= 0 ? '+' : ''}${d.overview.vsLastMonth}% so với tháng trước</span>
        <span class="badge ${d.overview.vsLastYear >= 0 ? 'up' : 'down'}">${d.overview.vsLastYear >= 0 ? '+' : ''}${d.overview.vsLastYear}% so với năm trước</span>
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card"><h3>Doanh thu theo ngành sách</h3><canvas id="chartCatStack"></canvas></div>
      <div class="card"><h3>Doanh thu theo kênh bán</h3><canvas id="chartChannel"></canvas></div>
    </div>

    <div class="grid grid-2">
      <div class="card"><h3>DT từng nhóm ngành so với mục tiêu</h3><canvas id="chartTarget"></canvas></div>
      <div class="card"><h3>Top 20 sách bán chạy (Số lượng)</h3><canvas id="chartTop20"></canvas></div>
    </div>

    ${d.categories.map((cat, i) => renderCategory(cat, i)).join('')}
  `;
            buildCharts();
        }

        function renderCategory(cat, idx) {
            let rightHtml = '';
            if (cat.heatmap) {
                const getCellColor = (valStr) => {
                    const parts = valStr.split('-');
                    const trend = parts[parts.length - 1]; // Lấy phần tử cuối cùng: TM, T, B, G, GM

                    switch (trend) {
                        case 'TM': return { bg: '#22c55e', color: '#fff' }; // Tăng mạnh (Xanh lá sáng)
                        case 'T': return { bg: 'rgba(34, 197, 94, 0.6)', color: '#fff' }; // Tăng (Xanh lá nhạt)
                        case 'GM': return { bg: '#ef4444', color: '#fff' }; // Giảm mạnh (Đỏ chói)
                        case 'G': return { bg: 'rgba(239, 68, 68, 0.6)', color: '#fff' }; // Giảm (Đỏ nhạt)
                        case 'B': return { bg: '#ffffff', color: '#0f172a' }; // Bằng (Trắng, chữ đen)
                        default: return { bg: 'var(--surface2)', color: '#fff' };
                    }
                };

                const tableHeaders = `<th style="text-align:left;min-width:120px;position:sticky;left:0;z-index:10;background:var(--surface2)">Sản phẩm</th>` +
                    cat.heatmap.labels.map(l => `<th style="white-space:nowrap;font-size:0.75rem">${l}</th>`).join('');

                const tableRows = cat.heatmap.data.map((row, rIdx) => {
                    const cells = row.values.map(v => {
                        const style = getCellColor(v);
                        return `<td style="background:${style.bg}; color:${style.color}; font-weight:600; font-size:0.75rem; white-space:nowrap; border:1px solid rgba(255,255,255,0.1)">${v}</td>`;
                    }).join('');
                    return `<tr><td style="text-align:left;position:sticky;left:0;background:var(--surface2);font-weight:600;font-size:0.8rem; border:1px solid rgba(255,255,255,0.1)">${rIdx + 1}. ${row.name}</td>${cells}</tr>`;
                }).join('');

                rightHtml = `
        <div class="card" style="grid-column: 1 / -1; overflow-x: auto;">
          <h3>Biểu đồ nhiệt 8 tuần</h3>
          <table style="width:100%; border-collapse:collapse; margin-top:10px;">
            <thead><tr>${tableHeaders}</tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>`;
            } else if (cat.dailyTarget) {
                const dt = cat.dailyTarget;
                rightHtml = `
        <div class="card">
          <h3>Top 1 & 2 - Mục tiêu tháng 2</h3>
          <div style="display:flex;gap:16px;margin-bottom:16px">
            <div style="flex:1;background:var(--surface2);padding:12px;border-radius:8px">
              <div style="font-size:.8rem;color:var(--text2)">Top 1: ${dt.top1.name}</div>
              <div style="font-size:1.3rem;font-weight:800;color:${cat.color}">${dt.top1.achieved}/${dt.top1.target}</div>
              <div class="${dt.top1.pct >= 80 ? 'status-green' : dt.top1.pct >= 60 ? 'status-yellow' : 'status-red'}">${dt.top1.pct}%</div>
            </div>
            <div style="flex:1;background:var(--surface2);padding:12px;border-radius:8px">
              <div style="font-size:.8rem;color:var(--text2)">Top 2: ${dt.top2.name}</div>
              <div style="font-size:1.3rem;font-weight:800;color:${cat.color}">${dt.top2.achieved}/${dt.top2.target}</div>
              <div class="${dt.top2.pct >= 80 ? 'status-green' : dt.top2.pct >= 60 ? 'status-yellow' : 'status-red'}">${dt.top2.pct}%</div>
            </div>
          </div>
          <table>
            <thead><tr><th>Ngày</th><th>${dt.top1.name}</th><th>${dt.top2.name}</th></tr></thead>
            <tbody>${dt.days.map(r => `<tr><td>${r.date}</td><td>${r.top1}</td><td>${r.top2}</td></tr>`).join('')}</tbody>
          </table>
        </div>`;
            }

            const targetActual = REPORT_DATA.targets.actual[idx];
            const targetGoal = REPORT_DATA.targets.target[idx];
            const targetPct = (targetActual / targetGoal * 100).toFixed(2).replace('.', ',');

            const headerBadge = `<div style="margin-left:auto; display:flex; align-items:center; gap: 15px;">
              <span style="font-size:.95rem; color:var(--text2)">
                Thực tế: <span style="color:var(--text);font-weight:700">${fmt(targetActual)}</span> / 
                Mục tiêu: <span style="color:var(--text);font-weight:700">${fmt(targetGoal)}</span>
              </span>
              <span class="badge ${(targetActual / targetGoal) >= 0.7 ? 'up' : 'down'}">${targetPct}%</span>
            </div>`;

            return `
    <div class="section" id="cat-${idx}">
      <div class="section-header" style="border-left:4px solid ${cat.color}">
        <span style="font-size:1.5rem">${cat.icon}</span>
        <h2 style="color:${cat.color}">${cat.name}</h2>
        ${headerBadge}
      </div>

      <div class="grid" style="grid-template-columns: 1fr;">
        <div class="card">
          <h3>Top 15 sản phẩm - SL bán</h3>
          <div class="legend">
            <span><i class="swatch" style="background:var(--ch-current)"></i>Tuần này</span>
            <span><i class="swatch" style="background:var(--ch-lastmonth)"></i>Tháng trước</span>
            <span><i class="swatch" style="background:var(--ch-lastyear)"></i>Năm trước</span>
            <span><i class="swatch" style="background:var(--ch-avg8w)"></i>TB 8 tuần</span>
          </div>
          <div style="overflow-x:auto; width:100%;">
            <div style="min-width: 1100px; min-height:360px;"><canvas id="chartCat${idx}Top15"></canvas></div>
          </div>
        </div>
        ${rightHtml}
      </div>
    </div>
  `;
        }

        // ============================================================
        // 📈 CHARTS
        // ============================================================
        function buildCharts() {
            const d = REPORT_DATA;

            // Datalabels config chung cho stack & bar
            const datalabelsValueM = {
                color: '#fff',
                font: { weight: 'bold', size: 10, family: 'Inter' },
                formatter: Math.round,
                anchor: 'end',
                align: 'top',
                formatter: (val) => val > 0 ? (val / 1000000).toFixed(1) + 'M' : ''
            };

            const datalabelsTotalM = {
                color: '#facc15',
                font: { weight: 'bold', size: 11, family: 'Inter' },
                anchor: 'end',
                align: 'top',
                formatter: (val, ctx) => {
                    let sum = 0;
                    let dataArr = ctx.chart.data.datasets.map(ds => ds.data[ctx.dataIndex]);
                    dataArr.forEach(data => { sum += data; });
                    // Chỉ in ra ở dataset cuối cùng (trên cùng)
                    if (ctx.datasetIndex === ctx.chart.data.datasets.length - 1) {
                        return (sum / 1000000).toFixed(1) + 'M';
                    }
                    return '';
                }
            };

            // Stacked category chart
            newChart('chartCatStack', 'bar', {
                labels: d.overview.stackedByCategory.labels,
                datasets: [
                    { label: 'Khác', data: d.overview.stackedByCategory.khac, backgroundColor: 'rgba(148,163,184,0.8)' },
                    { label: 'Đầu Tư', data: d.overview.stackedByCategory.dauTu, backgroundColor: 'rgba(124,58,237,0.8)' },
                    { label: 'PTBT', data: d.overview.stackedByCategory.ptbt, backgroundColor: 'rgba(34,197,94,0.8)' },
                    { label: 'Kinh Doanh', data: d.overview.stackedByCategory.kinhDoanh, backgroundColor: 'rgba(59,130,246,0.8)' }
                ]
            }, {
                scales: {
                    x: { stacked: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { stacked: true, ticks: { color: '#94a3b8', callback: v => fmtM(v) }, grid: { color: 'rgba(255,255,255,0.05)' } }
                },
                plugins: {
                    datalabels: {
                        color: '#fff',
                        font: { weight: 'bold', size: 10, family: 'Inter' },
                        anchor: 'center',
                        align: 'center',
                        formatter: (val) => val > 0 ? (val / 1000000).toFixed(1) + 'M' : ''
                    }
                },
                corePlugins: [{
                    id: 'totalLabelsVert',
                    afterDatasetsDraw(chart) {
                        const { ctx, data } = chart;
                        ctx.save();
                        ctx.fillStyle = '#facc15';
                        ctx.font = 'bold 11px Inter';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        data.labels.forEach((_, i) => {
                            let sum = 0;
                            let barX = 0;
                            let minY = chart.chartArea.bottom;
                            data.datasets.forEach((ds, j) => {
                                if (chart.isDatasetVisible(j)) {
                                    sum += ds.data[i];
                                    const meta = chart.getDatasetMeta(j).data[i];
                                    if (meta) {
                                        barX = meta.x;
                                        minY = Math.min(minY, meta.y);
                                    }
                                }
                            });
                            if (sum > 0) {
                                ctx.fillText((sum / 1000000).toFixed(1) + 'M', barX, minY - 4);
                            }
                        });
                        ctx.restore();
                    }
                }]
            });

            // Channel chart
            newChart('chartChannel', 'bar', {
                labels: d.channels.labels,
                datasets: [
                    { label: 'Tuần này', data: d.channels.current, backgroundColor: '#facc15' },
                    { label: 'Tháng trước', data: d.channels.lastMonth, backgroundColor: '#b91c1c' },
                    { label: 'Năm trước', data: d.channels.lastYear, backgroundColor: '#9ca3af' }
                ]
            }, {
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } },
                    y: { ticks: { color: '#94a3b8', callback: v => fmtM(v) }, grid: { color: 'rgba(255,255,255,0.05)' } }
                },
                plugins: {
                    datalabels: datalabelsValueM
                }
            });

            // Target chart
            newChart('chartTarget', 'bar', {
                labels: d.targets.labels,
                datasets: [
                    { label: 'Thực tế', data: d.targets.actual, backgroundColor: '#facc15' },
                    { label: 'Mục tiêu', data: d.targets.target, backgroundColor: '#c026d3' }
                ]
            }, {
                indexAxis: 'y',
                scales: {
                    x: { ticks: { color: '#94a3b8', callback: v => fmtM(v) }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                },
                plugins: {
                    datalabels: {
                        display: true,
                        color: '#fff',
                        font: { weight: 'bold', size: 10 },
                        anchor: 'center',
                        align: 'center',
                        formatter: value => fmtM(value) + 'M'
                    }
                }
            });

            // Top 20
            const t20 = d.top20.products;
            newChart('chartTop20', 'bar', {
                labels: t20.map(p => p.name),
                datasets: [
                    { label: 'Shopee', data: t20.map(p => p.shopee), backgroundColor: '#ef4444' },
                    { label: 'TikTok', data: t20.map(p => p.tiktok), backgroundColor: '#06b6d4' },
                    { label: 'Webshop', data: t20.map(p => p.webshop), backgroundColor: '#22c55e' },
                    { label: 'Tiki', data: t20.map(p => p.tiki), backgroundColor: '#3b82f6' },
                    { label: 'Lazada', data: t20.map(p => p.lazada), backgroundColor: '#f59e0b' }
                ]
            }, {
                indexAxis: 'y',
                paddingRight: 40,
                scales: {
                    x: { stacked: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { stacked: true, ticks: { color: '#94a3b8', font: { size: 11 } }, grid: { display: false } }
                },
                plugins: {
                    datalabels: {
                        display: function (ctx) {
                            return ctx.dataset.data[ctx.dataIndex] > 0;
                        },
                        color: 'rgba(255, 255, 255, 0.9)',
                        font: { size: 10 },
                        formatter: value => value
                    }
                },
                corePlugins: [{
                    id: 'totalLabels',
                    afterDatasetsDraw(chart) {
                        const { ctx, data } = chart;
                        ctx.save();
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 11px Inter';
                        ctx.textAlign = 'left';
                        ctx.textBaseline = 'middle';
                        data.labels.forEach((_, i) => {
                            let sum = 0;
                            let maxX = 0;
                            let barY = 0;
                            data.datasets.forEach((ds, j) => {
                                if (chart.isDatasetVisible(j)) {
                                    sum += ds.data[i];
                                    const meta = chart.getDatasetMeta(j).data[i];
                                    if (meta) {
                                        maxX = Math.max(maxX, meta.x);
                                        barY = meta.y;
                                    }
                                }
                            });
                            if (sum > 0 && maxX > 0) {
                                ctx.fillText(sum, maxX + 8, barY + 1);
                            }
                        });
                        ctx.restore();
                    }
                }]
            });

            // Per-category Top 15
            d.categories.forEach((cat, i) => {
                newChart(`chartCat${i}Top15`, 'bar', {
                    labels: cat.top15.labels,
                    datasets: [
                        { label: 'Tuần này', data: cat.top15.current, backgroundColor: '#facc15' },
                        { label: 'Tháng trước', data: cat.top15.lastMonth, backgroundColor: '#b91c1c' },
                        { label: 'Năm trước', data: cat.top15.lastYear, backgroundColor: '#9ca3af' },
                        { label: 'TB 8 tuần', data: cat.top15.avg8w, backgroundColor: '#06b6d4' }
                    ]
                }, {
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            display: true,
                            color: '#e2e8f0',
                            font: { size: 9 },
                            anchor: 'end',
                            align: 'top',
                            formatter: val => val > 0 ? val : ''
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#94a3b8',
                                font: { size: 10 },
                                maxRotation: 45,
                                minRotation: 45
                            },
                            grid: { display: false }
                        },
                        y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                });
            });
        }

        function newChart(id, type, data, opts = {}) {
            const el = document.getElementById(id);
            if (!el) return;
            const ctx = el.getContext('2d');
            el.parentElement.style.position = 'relative';
            el.parentElement.style.minHeight = type === 'bar' && opts.indexAxis === 'y' ? '360px' : '300px';
            new Chart(ctx, {
                type,
                data,
                options: {
                    layout: { padding: { top: 20, right: opts.paddingRight || 0 } },
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#94a3b8', font: { family: 'Inter', size: 11 } }, ...(opts.plugins?.legend || {}) },
                        ...(opts.plugins || {})
                    },
                    scales: opts.scales || {},
                    ...(opts.indexAxis ? { indexAxis: opts.indexAxis } : {})
                },
                plugins: opts.corePlugins || []
            });
        }

        // Initialize
        render();
    </script>
</body>
