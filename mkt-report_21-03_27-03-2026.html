        html {

        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #334155;
            --border: #475569;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --accent: #f59e0b;
            --green: #22c55e;
            --red: #ef4444;
            --purple: #7c3aed;
            --blue: #3b82f6;
            --pink: #ec4899;
            --cyan: #06b6d4;
            --cat-dautu: #7c3aed;
            --cat-ptbt: #22c55e;
            --cat-kinhdoanh: #3b82f6;
            --cat-khac: #94a3b8;
            --ch-current: #facc15;
            --ch-lastmonth: #b91c1c;
            --ch-lastyear: #9ca3af;
            --ch-avg8w: #06b6d4;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 4px
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        h2 .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block
        }

        h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text2)
        }

        .subtitle {
            text-align: center;
            color: var(--text2);
            margin-bottom: 30px;
            font-size: 1.1rem
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 60%);
            pointer-events: none
        }

        .hero .revenue {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 16px 0
        }

        .hero .growth {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 16px
        }

        .hero .growth .badge {
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem
        }

        .badge.up {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3)
        }

        .badge.down {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3)
        }

        /* Cards & Grid */
        .grid {
            display: grid;
            gap: 20px;
            margin-bottom: 30px
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr)
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: transform .2s, box-shadow .2s
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3)
        }

        .card canvas {
            max-height: 400px
        }

        /* Section Divider */
        .section {
            margin: 50px 0;
            padding-top: 30px;
            border-top: 2px solid var(--border)
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding: 16px 24px;
            border-radius: 12px;
            background: var(--surface)
        }

        .section-header h2 {
            margin: 0;
            font-size: 1.4rem
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .85rem
        }

        th,
        td {
            padding: 8px 10px;
            text-align: center;
            border-bottom: 1px solid var(--border)
        }

        th {
            background: var(--surface2);
            font-weight: 600;
            color: var(--text2);
            position: sticky;
            top: 0
        }

        td {
            color: var(--text)
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03)
        }

        .status-green {
            color: #22c55e;
            font-weight: 700
        }

        .status-red {
            color: #ef4444;
            font-weight: 700
        }

        .status-yellow {
            color: #facc15;
            font-weight: 700
        }

        /* Social Cards */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px
        }

        .social-card {
            background: var(--surface2);
            border-radius: 10px;
            padding: 16px
        }

        .social-card h4 {
            font-size: .95rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .social-card .metric {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: .85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05)
        }

        .social-card .metric .val {
            font-weight: 700;
            color: var(--accent)
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            font-size: .85rem
        }

        .legend span {
            display: flex;
            align-items: center;
            gap: 6px
        }

        .legend .swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            display: inline-block
        }

        @media(max-width:768px) {
            .grid-2 {
                grid-template-columns: 1fr
            }

            .hero .revenue {
                font-size: 2.2rem
            }
        }
    </style>
</head>

                labels: d.overview.stackedByCategory.labels,
                datasets: [
                    { label: 'Khác', data: d.overview.stackedByCategory.khac, backgroundColor: 'rgba(148,163,184,0.8)' },
                    { label: 'Đầu Tư', data: d.overview.stackedByCategory.dauTu, backgroundColor: 'rgba(124,58,237,0.8)' },
                    { label: 'PTBT', data: d.overview.stackedByCategory.ptbt, backgroundColor: 'rgba(34,197,94,0.8)' },
                    { label: 'Kinh Doanh', data: d.overview.stackedByCategory.kinhDoanh, backgroundColor: 'rgba(59,130,246,0.8)' }
                ]
            }, {
                scales: {
                    x: { stacked: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { stacked: true, ticks: { color: '#94a3b8', callback: v => fmtM(v) }, grid: { color: 'rgba(255,255,255,0.05)' } }
                },
                plugins: {
                    datalabels: {
                        color: '#fff',
                        font: { weight: 'bold', size: 10, family: 'Inter' },
                        anchor: 'center',
                        align: 'center',
                        formatter: (val) => val > 0 ? (val / 1000000).toFixed(1) + 'M' : ''
                    }
                },
                corePlugins: [{
                    id: 'totalLabelsVert',
                    afterDatasetsDraw(chart) {
                        const { ctx, data } = chart;
                        ctx.save();
                        ctx.fillStyle = '#facc15';
                        ctx.font = 'bold 11px Inter';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        data.labels.forEach((_, i) => {
                            let sum = 0;
                            let barX = 0;
                            let minY = chart.chartArea.bottom;
                            data.datasets.forEach((ds, j) => {
                                if (chart.isDatasetVisible(j)) {
                                    sum += ds.data[i];
                                    const meta = chart.getDatasetMeta(j).data[i];
                                    if (meta) {
                                        barX = meta.x;
                                        minY = Math.min(minY, meta.y);
                                    }
                                }
                            });
                            if (sum > 0) {
                                ctx.fillText((sum / 1000000).toFixed(1) + 'M', barX, minY - 4);
                            }
                        });
                        ctx.restore();
                    }
                }]
            });

            // Channel chart
            newChart('chartChannel', 'bar', {
                labels: d.channels.labels,
                datasets: [
                    { label: 'Tuần này', data: d.channels.current, backgroundColor: '#facc15' },
                    { label: 'Tháng trước', data: d.channels.lastMonth, backgroundColor: '#b91c1c' },
                    { label: 'Năm trước', data: d.channels.lastYear, backgroundColor: '#9ca3af' }
                ]
            }, {
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } },
                    y: { ticks: { color: '#94a3b8', callback: v => fmtM(v) }, grid: { color: 'rgba(255,255,255,0.05)' } }
                },
                plugins: {
                    datalabels: datalabelsValueM
                }
            });

            // Top 20
            const t20 = d.top20.products;
            newChart('chartTop20', 'bar', {
                labels: t20.map(p => p.name),
                datasets: [
                    { label: 'Shopee', data: t20.map(p => p.shopee), backgroundColor: '#ef4444' },
                    { label: 'TikTok', data: t20.map(p => p.tiktok), backgroundColor: '#06b6d4' },
                    { label: 'Webshop', data: t20.map(p => p.webshop), backgroundColor: '#22c55e' },
                    { label: 'Tiki', data: t20.map(p => p.tiki), backgroundColor: '#3b82f6' },
                    { label: 'Lazada', data: t20.map(p => p.lazada), backgroundColor: '#f59e0b' }
                ]
            }, {
                indexAxis: 'y',
                paddingRight: 40,
                scales: {
                    x: { stacked: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { stacked: true, ticks: { color: '#94a3b8', font: { size: 11 }, autoSkip: false }, grid: { display: false } }
                },
                plugins: {
                    datalabels: {
                        display: function (ctx) {
                            return ctx.dataset.data[ctx.dataIndex] > 0;
                        },
                        color: 'rgba(255, 255, 255, 0.9)',
                        font: { size: 10 },
                        formatter: value => value
                    }
                },
                corePlugins: [{
                    id: 'totalLabels',
                    afterDatasetsDraw(chart) {
                        const { ctx, data } = chart;
                        ctx.save();
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 11px Inter';
                        ctx.textAlign = 'left';
                        ctx.textBaseline = 'middle';
                        data.labels.forEach((_, i) => {
                            let sum = 0;
                            let maxX = 0;
                            let barY = 0;
                            data.datasets.forEach((ds, j) => {
                                if (chart.isDatasetVisible(j)) {
                                    sum += ds.data[i];
                                    const meta = chart.getDatasetMeta(j).data[i];
                                    if (meta) {
                                        maxX = Math.max(maxX, meta.x);
                                        barY = meta.y;
                                    }
                                }
                            });
                            if (sum > 0 && maxX > 0) {
                                ctx.fillText(sum, maxX + 8, barY + 1);
                            }
                        });
                        ctx.restore();
                    }
                }]
            });

            // Per-category Top 15
            d.categories.forEach((cat, i) => {
                newChart(`chartCat${i}Top15`, 'bar', {
                    labels: cat.top15.labels,
                    datasets: [
                        { label: 'Tuần này', data: cat.top15.current, backgroundColor: '#facc15' },
                        { label: 'Tháng trước', data: cat.top15.lastMonth, backgroundColor: '#b91c1c' },
                        { label: 'Năm trước', data: cat.top15.lastYear, backgroundColor: '#9ca3af' },
                        { label: 'TB 8 tuần', data: cat.top15.avg8w, backgroundColor: '#06b6d4' }
                    ]
                }, {
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            display: true,
                            color: '#e2e8f0',
                            font: { size: 9 },
                            anchor: 'end',
                            align: 'top',
                            formatter: val => val > 0 ? val : ''
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#94a3b8',
                                font: { size: 10 },
                                maxRotation: 45,
                                minRotation: 45
                            },
                            grid: { display: false }
                        },
                        y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                });
            });
        }

        function newChart(id, type, data, opts = {}) {
            const el = document.getElementById(id);
            if (!el) return;
            const ctx = el.getContext('2d');
            el.parentElement.style.position = 'relative';
            el.parentElement.style.minHeight = type === 'bar' && opts.indexAxis === 'y' ? '360px' : '300px';
            new Chart(ctx, {
                type,
                data,
                options: {
                    layout: { padding: { top: 20, right: opts.paddingRight || 0 } },
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#94a3b8', font: { family: 'Inter', size: 11 } }, ...(opts.plugins?.legend || {}) },
                        ...(opts.plugins || {})
                    },
                    scales: opts.scales || {},
                    ...(opts.indexAxis ? { indexAxis: opts.indexAxis } : {})
                },
                plugins: opts.corePlugins || []
            });
        }

        // Initialize
        render();
    </script>
</body>
